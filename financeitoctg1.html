<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Financeira do Sócio</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Ficha Financeira do Sócio</h1>

  <!-- Dados -->
  <div class="card">

    <h2>João da Silva</h2>

    <div class="info">
      <p><strong>Categoria:</strong> Sócio</p>
      <p><strong>Status:</strong> Ativo</p>
    </div>

  </div>

  <!-- Tabela -->
  <div class="card">

    <h3>Histórico de Pagamentos</h3>

    <table>

      <thead>

        <tr>
          <th>Mês/Ano</th>
          <th>Valor Sócio</th>
          <th>Data Sócio</th>

          <th>Valor Instrutor</th>
          <th>Data Instrutor</th>

          <th>Status</th>
          <th>Ação</th>
        </tr>

      </thead>

      <tbody id="tabelaPagamentos"></tbody>

    </table>

  </div>

</div>

<!-- MODAL -->

<div id="modalPagamento" class="modal">

  <div class="modal-content">

    <h3>Inserir Pagamento</h3>

    <!-- Sócio -->

    <label>Valor Sócio</label>
    <input type="number" id="valorSocio" placeholder="Digite o valor">

    <label>Data Pagamento Sócio</label>
    <input type="date" id="dataSocio">

    <!-- Instrutor -->

    <label>Valor Instrutor</label>
    <input type="number" id="valorInstrutor" placeholder="Digite o valor">

    <label>Data Pagamento Instrutor</label>
    <input type="date" id="dataInstrutor">

    <!-- Copiar -->

    <div class="copiar-data">
      <input type="checkbox" id="copiarData">
      <label for="copiarData">
        Usar mesma data do sócio
      </label>
    </div>

    <div class="modal-botoes">

      <button onclick="salvarPagamento()">
        Salvar
      </button>

      <button onclick="fecharModal()">
        Cancelar
      </button>

    </div>

  </div>

</div>

<script>

  const meses = [
    "Janeiro", "Fevereiro", "Março", "Abril",
    "Maio", "Junho", "Julho", "Agosto",
    "Setembro", "Outubro", "Novembro", "Dezembro"
  ];

  const ano = 2026;

  const tabela =
    document.getElementById("tabelaPagamentos");

  meses.forEach((mes) => {

    tabela.innerHTML += `

      <tr>

        <td>${mes}/${ano}</td>

        <td class="valor-socio">-</td>

        <td class="data-socio">-</td>

        <td class="valor-instrutor">-</td>

        <td class="data-instrutor">-</td>

        <td class="status atraso">
          Em aberto
        </td>

        <td>

          <button
            class="btn-pagar"
            onclick="abrirPagamento(this)"
          >

            Inserir Pagamento

          </button>

        </td>

      </tr>

    `;

  });

  let linhaAtual = null;

  function abrirPagamento(botao) {

    linhaAtual =
      botao.parentElement.parentElement;

    document.getElementById("modalPagamento")
      .style.display = "flex";
  }

  function fecharModal() {

    document.getElementById("modalPagamento")
      .style.display = "none";
  }

  // Copiar data automaticamente

  document.getElementById("copiarData")
    .addEventListener("change", function () {

      if (this.checked) {

        document.getElementById("dataInstrutor").value =
          document.getElementById("dataSocio").value;

      }

    });

  document.getElementById("dataSocio")
    .addEventListener("input", function () {

      if (
        document.getElementById("copiarData").checked
      ) {

        document.getElementById("dataInstrutor").value =
          this.value;

      }

    });

  function salvarPagamento() {

    const valorSocio =
      document.getElementById("valorSocio").value;

    const valorInstrutor =
      document.getElementById("valorInstrutor").value;

    const dataSocio =
      document.getElementById("dataSocio").value;

    const dataInstrutor =
      document.getElementById("dataInstrutor").value;

    if (
      !valorSocio &&
      !valorInstrutor
    ) {

      alert("Informe pelo menos um pagamento!");
      return;
    }

    const campoSocio =
      linhaAtual.querySelector(".valor-socio");

    const campoDataSocio =
      linhaAtual.querySelector(".data-socio");

    const campoInstrutor =
      linhaAtual.querySelector(".valor-instrutor");

    const campoDataInstrutor =
      linhaAtual.querySelector(".data-instrutor");

    const status =
      linhaAtual.querySelector(".status");

    // Sócio

    if (valorSocio) {

      campoSocio.innerText =
        "R$ " + Number(valorSocio).toFixed(2);

      if (dataSocio) {

        campoDataSocio.innerText =
          new Date(dataSocio)
          .toLocaleDateString('pt-BR');

      }

    }

    // Instrutor

    if (valorInstrutor) {

      campoInstrutor.innerText =
        "R$ " + Number(valorInstrutor).toFixed(2);

      if (dataInstrutor) {

        campoDataInstrutor.innerText =
          new Date(dataInstrutor)
          .toLocaleDateString('pt-BR');

      }

    }

    // Verifica status

    const socioPago =
      campoSocio.innerText !== "-";

    const instrutorPago =
      campoInstrutor.innerText !== "-";

    if (
      socioPago &&
      instrutorPago
    ) {

      status.innerText = "Pago";
      status.className = "status pago";

    } else {

      status.innerText = "Parcial";
      status.className = "status parcial";

    }

    fecharModal();

    // Limpar campos

    document.getElementById("valorSocio").value = "";
    document.getElementById("valorInstrutor").value = "";

    document.getElementById("dataSocio").value = "";
    document.getElementById("dataInstrutor").value = "";

    document.getElementById("copiarData").checked = false;
  }

</script>

</body>
</html>
